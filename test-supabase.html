<!DOCTYPE html>
<html>

<head>
    <title>Test Supabase</title>
</head>

<body>
    <h1>Supabase CDN Test</h1>
    <pre id="log"></pre>

    <script>
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        }
    </script>

    <!-- Test the UMD bundle -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        log('1. typeof window.supabase = ' + typeof window.supabase);
        log('2. window.supabase keys = ' + (typeof window.supabase === 'object' ? Object.keys(window.supabase).join(', ') : 'N/A'));

        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
            log('3. createClient FOUND - initializing...');

            var sb = window.supabase.createClient(
                'https://abkseebmtwmfxmrgiqgr.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFia3NlZWJtdHdtZnhtcmdpcWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzQwODIsImV4cCI6MjA4NjQxMDA4Mn0.4C0l888NPcbCnX3Eb1aYRa5AcscBdUWn7gtnMXOa0aY'
            );

            log('4. Client created: ' + typeof sb);

            sb.from('advocaciones')
                .select('nombre, slug')
                .eq('publicado', true)
                .limit(3)
                .then(function (result) {
                    log('5. Query result: error=' + (result.error ? result.error.message : 'none'));
                    log('6. Data count: ' + (result.data ? result.data.length : 0));
                    if (result.data) {
                        result.data.forEach(function (row) {
                            log('   - ' + row.nombre + ' (' + row.slug + ')');
                        });
                    }
                })
                .catch(function (err) {
                    log('5. CATCH error: ' + err.message);
                });
        } else {
            log('3. createClient NOT FOUND');
            log('   Trying alternative paths...');

            // Maybe the global is different
            var globals = ['supabase', 'Supabase', 'supabaseJs', 'SupabaseClient'];
            globals.forEach(function (g) {
                log('   window.' + g + ' = ' + typeof window[g]);
            });
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Parámetros del Sitio</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <header class="main-header">
                <div>
                    <h1>Parámetros del Sitio</h1>
                    <div class="breadcrumb"><span class="breadcrumb-site"></span> · <span>Parámetros</span></div>
                </div>
            </header>
            <div class="page-content">
                <div class="card filter-card">
                    <div class="card-header" onclick="toggleFilters()">
                        <h2>🔍 Filtros</h2>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="filter-body" id="filter-body"></div>
                </div>
                <div class="card">
                    <div class="table-toolbar" id="table-toolbar"></div>
                    <div style="overflow-x:auto">
                        <table class="data-table">
                            <thead id="table-head"></thead>
                            <tbody id="table-body">
                                <tr>
                                    <td colspan="99">
                                        <div class="loading-spinner">Cargando datos...</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-admin.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/admin-crud.js"></script>
    <script>
        (async () => {
            renderSidebar('parametros');
            const ok = await requireAuth();
            if (!ok) return;

            await initCRUD({
                table: 'parametros_sitio',
                title: 'Parámetros del Sitio',
                singularTitle: 'Parámetro',
                pageSize: 20,
                defaultSort: 'clave',
                defaultSortAsc: true,
                searchColumns: ['clave', 'valor', 'descripcion'],
                columns: [
                    { key: 'clave', label: 'Clave', sortable: true },
                    { key: 'valor', label: 'Valor', type: 'truncate', sortable: true },
                    { key: 'descripcion', label: 'Descripción', type: 'truncate' },
                    { key: 'updated_at', label: 'Última Actualización', type: 'date', sortable: true }
                ],
                filters: [
                    { key: 'clave', label: 'Clave', type: 'text', placeholder: 'Buscar clave...', searchable: true },
                    { key: 'valor', label: 'Valor', type: 'text', placeholder: 'Buscar valor...', searchable: true }
                ],
                formFields: [
                    { key: 'clave', label: 'Clave', type: 'text', required: true, help: 'Identificador único, ej: nombre_sitio' },
                    { key: 'valor', label: 'Valor', type: 'textarea', rows: 3, required: true, help: 'Valor del parámetro' },
                    { key: 'descripcion', label: 'Descripción', type: 'textarea', rows: 2, help: 'Descripción del uso de este parámetro' }
                ]
            });
        })();
    </script>
</body>

</html>

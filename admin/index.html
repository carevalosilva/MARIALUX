<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="page-title">Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0c5bed",
                        "background-light": "#f5f7fa",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Public Sans", sans-serif
        }

        .bg-pattern {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAix87A_nn59VunUszOilvQmpSc-sZAP7dI-hzvw4Ffx6RjVKmEsgWqT-ZDrBuSXlun4XE-tteAQ4e5Q-o1cZqk1K7I0X1qDMtXa8EBL_ECoV39JqK_2B_A4aabUSi9thsXId-JeKNKCxHE5BFCyDiHnBFD9h4H_GJ0H5kzxsIWoQyy_S0fnEl3yMTFHV1LcciKA_JXBcM2sV1ZishU44odoBUYCQ8HF1vrLJ-IQ-MeBNEBUJOajkDMIxcyLWgUzQE5CG592LDbH6g);
            background-color: #f5f7fa
        }

        .dark .bg-pattern {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBIMz9-qVuFqa1No8sAhGvftEv3ex4gPMYHHR6cadHBd9cYnY3kpSXF4-fwj26rY2ivnWu5AY9DLwIJTVEIJADfWrg19DpJ56obrdfhW_u1Zv_CT5O69BozQXzi1aDJP7LPODylr_hQvRSgN4YK0OwyNP_XQYHN_PhmDYzyFOb6SiaimL6zkfMwu5_lDcRThW0X3h41VBDHL8mWMq24tvsDK9311kRTUHCVKtxr-dCdOknn-Ez-XYBENT6BmPr9X3emkdJiS5sp4_o);
            background-color: #101622;
            filter: invert(1)
        }

        /* Error message */
        .login-error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
        }

        /* Loading spinner on button */
        .btn-loading .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
    <!-- Background Pattern Wrapper -->
    <div class="fixed inset-0 z-0 opacity-40 pointer-events-none bg-pattern"></div>
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6">
        <!-- Login Card Container -->
        <div
            class="w-full max-w-[440px] bg-white dark:bg-slate-900 shadow-xl rounded-lg border border-slate-200 dark:border-slate-800 overflow-hidden">
            <!-- Logo Section -->
            <div class="pt-10 pb-6 flex flex-col items-center gap-4">
                <div class="flex items-center gap-3 text-primary">
                    <div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center text-xl">✝</div>
                    <h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight"><span
                            id="login-site-name"></span> <span class="text-primary/70 font-medium">Admin</span>
                    </h1>
                </div>
                <div class="text-center px-8">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight">Iniciar Sesión</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Acceda al panel de administración de
                        advocaciones</p>
                </div>
            </div>
            <!-- Form Section -->
            <form id="login-form" class="px-8 pb-10 space-y-5" onsubmit="return handleLogin(event)">
                <!-- Email Input -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold" for="email">Correo
                        Electrónico</label>
                    <div class="relative group">
                        <input id="email"
                            class="block w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm"
                            placeholder="ejemplo@marialux.com" type="email" required autofocus />
                    </div>
                </div>
                <!-- Password Input -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold"
                        for="password">Contraseña</label>
                    <div class="relative group">
                        <input id="password"
                            class="block w-full px-4 pr-12 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm"
                            placeholder="••••••••" type="password" required />
                        <button id="toggle-password"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                            type="button" onclick="togglePasswordVisibility()">
                            <span id="toggle-icon" style="font-size:14px">👁</span>
                        </button>
                    </div>
                </div>
                <!-- Helpers Section -->
                <div class="flex items-center justify-between text-xs sm:text-sm">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input
                            class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-all cursor-pointer"
                            type="checkbox" />
                        <span
                            class="text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200">Recordarme</span>
                    </label>
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4"
                        href="#">¿Olvidó su contraseña?</a>
                </div>
                <!-- Error Message -->
                <div class="login-error-msg" id="login-error"></div>
                <!-- CTA Button -->
                <button id="btn-login"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4"
                    type="submit">
                    <span id="btn-login-text">Ingresar</span>
                    <span id="btn-login-icon">→</span>
                </button>
            </form>
        </div>
        <!-- Support Info / Extra Links -->
        <div class="mt-8 text-center space-y-4">
            <p class="text-slate-500 dark:text-slate-400 text-sm">
                ¿No tiene una cuenta?
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Contactar soporte</a>
            </p>
        </div>
    </main>
    <!-- Footer -->
    <footer class="relative z-10 py-6 text-center">
        <p class="text-slate-400 dark:text-slate-500 text-xs tracking-wide">
            <span id="login-copyright"></span>
        </p>
    </footer>

    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase client — self-contained for login page
        const _SUPABASE_URL = 'https://abkseebmtwmfxmrgiqgr.supabase.co';
        const _SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFia3NlZWJtdHdtZnhtcmdpcWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzQwODIsImV4cCI6MjA4NjQxMDA4Mn0.4C0l888NPcbCnX3Eb1aYRa5AcscBdUWn7gtnMXOa0aY';
        const _sb = supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);

        // If already logged in, redirect immediately
        _sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/admin/dashboard';
        });

        // Toggle password visibility
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🔒';
            } else {
                input.type = 'password';
                icon.textContent = '👁';
            }
        }

        // Handle login — auth ONLY, no DB query
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-login-text');
            const btnIcon = document.getElementById('btn-login-icon');
            const errEl = document.getElementById('login-error');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Loading state
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btnText.textContent = 'Verificando...';
            btnIcon.innerHTML = '<div class="spinner"></div>';
            btn.classList.add('btn-loading');
            errEl.style.display = 'none';

            try {
                // Only authenticate — do NOT query any table here
                const { data, error } = await _sb.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // Auth success — redirect to dashboard (profile check happens there)
                window.location.href = '/admin/dashboard';

            } catch (err) {
                console.error('Login error:', err);
                let message = 'Email o contraseña incorrectos.';

                if (err.message && err.message.includes('Email not confirmed')) {
                    message = 'El correo no ha sido confirmado.';
                }

                errEl.textContent = message;
                errEl.style.display = 'block';

                // Reset button
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed', 'btn-loading');
                btnText.textContent = 'Ingresar';
                btnIcon.innerHTML = 'login';
            }

            return false;
        }
    </script>
    <script>
        // Load dynamic site name
        (async function () {
            try {
                const { data } = await _sb.from('parametros_sitio').select('clave, valor');
                if (!data) return;
                const params = {};
                data.forEach(r => { params[r.clave] = r.valor; });
                const name = params.nombre_sitio || 'MARIALUX';
                const el = document.getElementById('login-site-name');
                if (el) el.textContent = name;
                const title = document.getElementById('page-title');
                if (title) title.textContent = name + ' Admin Login';
                const copy = document.getElementById('login-copyright');
                if (copy && params.copyright_texto) copy.textContent = params.copyright_texto;
            } catch (e) { /* keep defaults */ }
        })();
    </script>
</body>

</html>

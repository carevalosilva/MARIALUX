<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARIALUX Admin — Advocaciones</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar"></aside>
        <div class="main-content">
            <header class="main-header">
                <div>
                    <h1>Trabajar con Advocaciones</h1>
                    <div class="breadcrumb">MARIALUX · <span>Advocaciones</span></div>
                </div>
            </header>
            <div class="page-content">
                <div class="card filter-card">
                    <div class="card-header" onclick="toggleFilters()">
                        <h2>🔍 Filtros</h2>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="filter-body" id="filter-body"></div>
                </div>
                <div class="card">
                    <div class="table-toolbar" id="table-toolbar"></div>
                    <div style="overflow-x:auto">
                        <table class="data-table">
                            <thead id="table-head"></thead>
                            <tbody id="table-body">
                                <tr>
                                    <td colspan="99">
                                        <div class="loading-spinner">Cargando datos...</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-admin.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/admin-crud.js"></script>
    <script>
        const TIPOS_ORIGEN = ['Aparición', 'Imagen Hallada', 'Patronazgo Histórico', 'Iconografía Dogmática'];
        const ESTATUS = ['Culto Universal', 'Aprobación Pontificia', 'Coronación Pontificia', 'Patrona Nacional', 'Culto Local', 'Aparición aprobada por la Santa Sede', 'En estudio'];

        (async () => {
            renderSidebar('advocaciones');
            const ok = await requireAuth();
            if (!ok) return;

            await initCRUD({
                table: 'advocaciones',
                title: 'Advocaciones',
                singularTitle: 'Advocación',
                pageSize: 10,
                defaultSort: 'nombre',
                defaultSortAsc: true,
                searchColumns: ['nombre', 'slug', 'descripcion_corta', 'lugar_especifico'],
                foreignKeys: [
                    { key: 'paises', table: 'paises', columns: 'id, nombre' }
                ],
                columns: [
                    { key: 'nombre', label: 'Nombre', sortable: true },
                    { key: 'pais_id', label: 'País', fkLookup: 'paises' },
                    { key: 'lugar_especifico', label: 'Lugar', type: 'truncate' },
                    { key: 'siglo', label: 'Siglo', sortable: true },
                    { key: 'anio', label: 'Año', sortable: true },
                    { key: 'festividad', label: 'Festividad' },
                    { key: 'tipo_origen', label: 'Tipo Origen', type: 'badge', badgeMap: { 'Aparición': 'badge-info', 'Imagen Hallada': 'badge-success', 'Patronazgo Histórico': 'badge-warning', 'Iconografía Dogmática': 'badge-neutral' } },
                    { key: 'estatus_eclesiastico', label: 'Estatus', type: 'badge', badgeMap: { 'Culto Universal': 'badge-info', 'Aprobación Pontificia': 'badge-success', 'Coronación Pontificia': 'badge-success', 'Patrona Nacional': 'badge-warning', 'Culto Local': 'badge-neutral', 'Aparición aprobada por la Santa Sede': 'badge-info', 'En estudio': 'badge-neutral' } },
                    { key: 'publicado', label: 'Publicado', type: 'boolean', sortable: true }
                ],
                filters: [
                    { key: 'nombre', label: 'Nombre', type: 'text', placeholder: 'Buscar...', searchable: true },
                    { key: 'pais_id', label: 'País', type: 'select', fk: 'paises' },
                    { key: 'tipo_origen', label: 'Tipo Origen', type: 'select', options: TIPOS_ORIGEN },
                    { key: 'estatus_eclesiastico', label: 'Estatus Eclesiástico', type: 'select', options: ESTATUS },
                    { key: 'siglo', label: 'Siglo', type: 'text', placeholder: 'Ej: XVI' },
                    { key: 'publicado', label: 'Publicado', type: 'boolean' }
                ],
                formFields: [
                    { key: 'nombre', label: 'Nombre', type: 'text', required: true },
                    { key: 'slug', label: 'Slug', type: 'text', required: true, help: 'URL-friendly' },
                    { key: 'descripcion_corta', label: 'Descripción Corta', type: 'textarea', rows: 2 },
                    { key: 'pais_id', label: 'País', type: 'select', fk: 'paises', required: true },
                    { key: 'lugar_especifico', label: 'Lugar Específico', type: 'text' },
                    { key: 'siglo', label: 'Siglo', type: 'text', help: 'Ej: XVI' },
                    { key: 'anio', label: 'Año', type: 'number' },
                    { key: 'festividad', label: 'Festividad', type: 'text', help: 'Ej: 12 de diciembre' },
                    { key: 'tipo_origen', label: 'Tipo Origen', type: 'select', options: TIPOS_ORIGEN, required: true },
                    { key: 'estatus_eclesiastico', label: 'Estatus Eclesiástico', type: 'select', options: ESTATUS, required: true },
                    { key: 'imagen_url', label: 'URL de Imagen', type: 'text' },
                    { key: 'imagen_caption', label: 'Caption de Imagen', type: 'text' },
                    { key: 'historia', label: 'Historia', type: 'textarea', rows: 4 },
                    { key: 'significado_espiritual', label: 'Significado Espiritual', type: 'textarea', rows: 3 },
                    { key: 'cita_destacada', label: 'Cita Destacada', type: 'textarea', rows: 2 },
                    { key: 'notas_doctrinales', label: 'Notas Doctrinales', type: 'textarea', rows: 3 },
                    { key: 'fuentes', label: 'Fuentes', type: 'textarea', rows: 2 },
                    { key: 'publicado', label: 'Publicado', type: 'checkbox', default: false }
                ]
            });
        })();
    </script>
</body>

</html>
